# https://taskfile.dev

version: '3'

tasks:
  flux:
    cmds:
    - flux reconcile source git flux-system
    - flux reconcile kustomization flux-system
    - flux reconcile kustomization main-tenant
    - flux reconcile kustomization main-controllers
    - flux reconcile kustomization main-configs
  new-cluster:
    desc: "Scaffold a new CAPI-managed Talos cluster in the repo"
    cmds:
    - ./assets/scripts/new-cluster.sh

  add-kubeconfig:
    desc: "Fetch CA from CAPI secret and add OIDC context to kubeconfig. Usage: task add-kubeconfig CLUSTER=<name>"
    cmds:
    - ./assets/scripts/add-kubeconfig.sh {{.CLUSTER}}

  enable-sops-reflection:
    desc: "Annotate flux-system/sops-gpg so reflector auto-copies it into *-cluster namespaces. Run once after (re)bootstrap."
    cmds:
    - ./assets/scripts/enable-sops-reflection.sh

  tfplan:
    cmds:
    - terraform -chdir=terraform/0-infra/ plan
    - terraform -chdir=terraform/1-vault/ plan
    - terraform -chdir=terraform/2-authentik/ plan
    - terraform -chdir=terraform/3-harbor/ plan
