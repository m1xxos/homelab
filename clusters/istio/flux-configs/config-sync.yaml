---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: istio-controllers
  namespace: flux-system
spec:
  dependsOn:
  - name: flux-system
  interval: 10m0s
  path: ./clusters/istio-controllers
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: istio-configs
  namespace: flux-system
spec:
  dependsOn:
  - name: istio-controllers
  interval: 10m0s
  path: ./clusters/istio-configs
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
