---
apiVersion: v1
kind: Secret
metadata:
  name: cilium-clustermesh
  namespace: kube-system
stringData:
  # Agent-facing peer config for the hub. With kvstoremesh, main's local
  # clustermesh-apiserver mirrors each spoke's state, so the entry is named after
  # the REMOTE spoke (test) but points at main's LOCAL apiserver etcd. Replaces a
  # stale "gitlab" self-entry (dead cluster) that loaded no remote services.
  test: |
    endpoints:
    - https://clustermesh-apiserver.kube-system.svc:2379
    trusted-ca-file: /var/lib/cilium/clustermesh/local-etcd-client-ca.crt
    key-file: /var/lib/cilium/clustermesh/local-etcd-client.key
    cert-file: /var/lib/cilium/clustermesh/local-etcd-client.crt
