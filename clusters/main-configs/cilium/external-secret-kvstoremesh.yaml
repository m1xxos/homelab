---
# Base secret for clustermesh peers on main.
#
# Peers are NOT listed here anymore. The kro Cluster RGD
# (clusters/main-configs/kro/cluster-rgd.yaml) generates a per-cluster
# ExternalSecret with target.creationPolicy: Merge that writes each new
# cluster's etcd client certs into THIS secret. So adding a cluster needs no
# edit here — just create a Cluster CR.
#
# This empty secret only exists so ESO Merge has a target to write into
# (Merge does not create the secret). Empty == no remote peers.
apiVersion: v1
kind: Secret
metadata:
  name: cilium-kvstoremesh
  namespace: kube-system
type: Opaque
