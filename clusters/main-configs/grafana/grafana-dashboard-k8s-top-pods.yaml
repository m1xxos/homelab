apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
  name: k8s-top-pods
  namespace: monitoring
spec:
  resyncPeriod: 10m
  instanceSelector:
    matchLabels:
      dashboards: grafana
  json: |
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "VictoriaMetrics",
          "type": "datasource",
          "pluginId": "prometheus",
          "pluginName": "Prometheus"
        }
      ],
      "annotations": {
        "list": []
      },
      "editable": true,
      "graphTooltip": 0,
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Top memory pods",
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "expr": "topk(10, sum by (namespace,pod) (container_memory_working_set_bytes{pod!='',container!='',metrics_path='/metrics/cadvisor'}))",
              "legendFormat": "{{namespace}}/{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 9
          }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Top write pods (bytes/s)",
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "expr": "topk(10, sum by (namespace,pod) (rate(container_fs_writes_bytes_total{pod!='',container!=''}[5m])))",
              "legendFormat": "{{namespace}}/{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps"
            },
            "overrides": []
          },
          "gridPos": {
            "x": 0,
            "y": 9,
            "w": 24,
            "h": 9
          }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 40,
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "browser",
      "title": "K8s / Top Pods",
      "uid": "k8s_top_pods",
      "version": 1
    }
  datasources:
  - inputName: DS_PROMETHEUS
    datasourceName: VictoriaMetrics
