---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: kubernetes-views-global
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  grafanaCom:
    id: 15757
  datasources:
  - inputName: DS_PROMETHEUS
    datasourceName: VictoriaMetrics
