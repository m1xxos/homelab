metadata:
  name: node-exporter-full
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  grafanaCom:
    id: 1860
  datasources:
  - inputName: DS_PROMETHEUS
    datasourceName: VictoriaMetrics
