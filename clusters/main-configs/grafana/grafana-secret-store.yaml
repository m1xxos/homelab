apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: grafana-store
  namespace: monitoring
spec:
  provider:
    vault:
      server: "https://vault.local.m1xxos.online"
      path: "main"
      version: "v2"
      auth:
        # Authenticate against Vault using the grafana-reader Kubernetes
        # ServiceAccount (Vault role grafana-reader, policy reads main/grafana/*).
        kubernetes:
          mountPath: "kubernetes"
          role: "grafana-reader"
          serviceAccountRef:
            name: "grafana-reader"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-oauth
  namespace: monitoring
spec:
  refreshInterval: "1h0m0s"
  secretStoreRef:
    name: grafana-store
  target:
    name: grafana-oauth
  data:
  - secretKey: oidc_client_id
    remoteRef:
      key: grafana/grafana-auth
      property: oidc_client_id
  - secretKey: oidc_client_secret
    remoteRef:
      key: grafana/grafana-auth
      property: oidc_client_secret
