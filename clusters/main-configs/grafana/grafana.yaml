apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: monitoring
  labels:
    dashboards: grafana
spec:
  persistentVolumeClaim:
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
  config:
    auth:
      oauth_auto_login: "true"
      signout_redirect_url: "https://authentik.local.m1xxos.online/application/o/grafana/end-session/"
    auth.generic_oauth:
      name: authentik
      enabled: "true"
      client_id: $__env{OAUTH_CLIENT_ID}
      client_secret: $__env{OAUTH_CLIENT_SECRET}
      scopes: "openid profile email"
      auth_url: "https://authentik.local.m1xxos.online/application/o/authorize/"
      token_url: "https://authentik.local.m1xxos.online/application/o/token/"
      api_url: "https://authentik.local.m1xxos.online/application/o/userinfo/"
      role_attribute_path: contains(groups, 'Grafana Admins') && 'Admin' || contains(groups, 'Grafana Editors') && 'Editor' || 'Viewer'
    server:
      root_url: https://grafana.local.m1xxos.online
  deployment:
    spec:
      strategy:
        type: Recreate
      template:
        spec:
          serviceAccountName: grafana-reader
          containers:
          - name: grafana
            resources:
              requests:
                cpu: 50m
                memory: 400Mi
              limits:
                memory: 800Mi
            env:
            # OIDC client credentials from Vault via ESO (grafana-oauth secret),
            # referenced in auth.generic_oauth config with $__env{}.
            - name: OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: grafana-oauth
                  key: oidc_client_id
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: grafana-oauth
                  key: oidc_client_secret
