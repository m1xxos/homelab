apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-oidc-values
  namespace: harbor
spec:
  refreshInterval: "1h0m0s"
  secretStoreRef:
    name: harbor-store
  target:
    name: harbor-oidc-values
    template:
      engineVersion: v2
      data:
        values.yaml: |
          core:
            configureUserSettings: |
              {"auth_mode":"oidc_auth","oidc_name":"Authentik","oidc_endpoint":"https://authentik.local.m1xxos.online/application/o/harbor/","oidc_client_id":"{{ .oidc_client_id }}","oidc_client_secret":"{{ .oidc_client_secret }}","oidc_scope":"openid,profile,email","oidc_user_claim":"preferred_username","oidc_groups_claim":"groups","oidc_admin_group":"harbor-admins","oidc_verify_cert":true,"oidc_auto_onboard":true}
  data:
  - secretKey: oidc_client_id
    remoteRef:
      key: harbor/harbor-auth
      property: oidc_client_id
  - secretKey: oidc_client_secret
    remoteRef:
      key: harbor/harbor-auth
      property: oidc_client_secret
