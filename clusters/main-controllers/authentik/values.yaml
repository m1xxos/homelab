---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-values
  namespace: authentik
  labels:
    reconcile.fluxcd.io/watch: Enabled
data:
  values.yaml: |
    authentik:
      secret_key: file:///secret-key/secret-key
      postgresql:
        host: authentik-new-rw
        user: file:///postgres-creds/username
        password: file:///postgres-creds/password
    server:
      serviceAccountName: authentik-reader
      # Observed ~430Mi under normal load (2026-07); memory is the cluster
      # bottleneck, so keep requests close to reality.
      resources:
        requests:
          cpu: 200m
          memory: 600Mi
        limits:
          memory: 1200Mi
      route:
        main:
          enabled: true
          hostnames:
          - authentik.local.m1xxos.online
          parentRefs:
          - name: traefik-gateway
            namespace: traefik
      volumes:
      - name: postgres-creds
        secret:
          secretName: authentik-new-app
      - name: secret-key
        secret:
          secretName: authentik-secret-key
      volumeMounts:
      - name: postgres-creds
        mountPath: /postgres-creds
        readOnly: true
      - name: secret-key
        mountPath: /secret-key
        readOnly: true
    worker:
      serviceAccountName: authentik-reader
      # Observed ~320Mi under normal load (2026-07); the old 1100Mi request
      # dated from the pre-2025 gunicorn worker model.
      resources:
        requests:
          cpu: 150m
          memory: 512Mi
        limits:
          memory: 1024Mi
      volumes:
      - name: postgres-creds
        secret:
          secretName: authentik-new-app
      - name: secret-key
        secret:
          secretName: authentik-secret-key
      volumeMounts:
      - name: postgres-creds
        mountPath: /postgres-creds
        readOnly: true
      - name: secret-key
        mountPath: /secret-key
        readOnly: true
    redis:
      enabled: true
