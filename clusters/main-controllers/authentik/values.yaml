---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-values
  namespace: authentik
  labels:
    reconcile.fluxcd.io/watch: Enabled
data:
  values.yaml: |
    authentik:
      secret_key: file:///secret-key/secret-key
      postgresql:
        host: authentik-new-rw
        user: file:///postgres-creds/username
        password: file:///postgres-creds/password
    server:
      serviceAccountName: authentik-reader
      resources:
        requests:
          memory: 512Mi
      route:
        main:
          enabled: true
          hostnames:
          - authentik.local.m1xxos.online
          parentRefs:
          - name: traefik-gateway
            namespace: traefik
      volumes:
      - name: postgres-creds
        secret:
          secretName: authentik-new-app
      - name: secret-key
        secret:
          secretName: authentik-secret-key
      volumeMounts:
      - name: postgres-creds
        mountPath: /postgres-creds
        readOnly: true
      - name: secret-key
        mountPath: /secret-key
        readOnly: true
    worker:
      serviceAccountName: authentik-reader
      resources:
        requests:
          memory: 768Mi
      volumes:
      - name: postgres-creds
        secret:
          secretName: authentik-new-app
      - name: secret-key
        secret:
          secretName: authentik-secret-key
      volumeMounts:
      - name: postgres-creds
        mountPath: /postgres-creds
        readOnly: true
      - name: secret-key
        mountPath: /secret-key
        readOnly: true
    redis:
      enabled: true
