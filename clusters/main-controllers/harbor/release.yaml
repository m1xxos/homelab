---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor
  namespace: harbor
spec:
  interval: 20m
  chart:
    spec:
      chart: harbor
      version: 1.19.0
      sourceRef:
        kind: HelmRepository
        name: harbor
        namespace: flux-system
  install:
    createNamespace: true
  targetNamespace: harbor
  valuesFrom:
  - kind: ConfigMap
    name: harbor-values
    valuesKey: values.yaml
  - kind: Secret
    name: harbor-oidc-values
    valuesKey: values.yaml
    optional: true
