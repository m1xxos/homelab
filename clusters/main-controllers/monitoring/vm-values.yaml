---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vm-values
  namespace: monitoring
  labels:
    reconcile.fluxcd.io/watch: Enabled
data:
  values.yaml: |
    nameOverride: "vm"
    fullnameOverride: "vm"
    vmagent:
      spec:
        # Tag every series this hub scrapes with cluster="main" so hub-origin
        # metrics are distinguishable from spoke series (which set their own
        # externalLabels.cluster) in the shared VMSingle.
        externalLabels:
          cluster: main
        # 60s is plenty for homelab dashboards; halves vmsingle ingest
        # (CPU/memory and merge I/O towards the fragile plusha disk).
        scrapeInterval: 60s
        # kube-apiserver /metrics exceeds the 16MiB default scrape limit on this
        # cluster; raise the cap so the API server target can be scraped.
        extraArgs:
          promscrape.maxScrapeSize: "32MiB"
        # Drop high-cardinality histogram buckets that no installed dashboard
        # or rule queries (~95k of 417k active series as of 2026-06-09).
        # Only _bucket series are dropped — _sum/_count stay, so averages
        # still work. The dotdc API-server dashboard uses the _sli_ metric,
        # which is kept.
        inlineRelabelConfig:
        - action: drop
          sourceLabels: [__name__]
          regex: "(apiserver_request_duration_seconds_bucket|apiserver_request_body_size_bytes_bucket|apiserver_response_sizes_bucket|apiserver_watch_list_duration_seconds_bucket|apiserver_watch_cache_read_wait_seconds_bucket|etcd_request_duration_seconds_bucket|longhorn_rest_client_rate_limiter_latency_seconds_bucket|longhorn_rest_client_request_latency_seconds_bucket|longhorn_workqueue_queue_duration_seconds_bucket|longhorn_workqueue_work_duration_seconds_bucket|rest_client_request_duration_seconds_bucket)"
        resources:
          requests:
            cpu: 100m
            memory: 192Mi
          limits:
            memory: 384Mi
      route:
        enabled: true
        hostnames:
        - vmagent.local.m1xxos.online
        parentRefs:
        - name: traefik-gateway
          namespace: traefik
    vmsingle:
      spec:
        retentionPeriod: "3d"
        resources:
          requests:
            cpu: 250m
            memory: 900Mi
          limits:
            memory: 1800Mi
        extraArgs:
          opentelemetry.usePrometheusNaming: "true"
        # RWO + single replica: metrics are disposable (3d retention) and a
        # single-pod workload; RWX forced a Longhorn share-manager NFS hop.
        # Changing this on a live cluster requires deleting the old PVC.
        storage:
          storageClassName: longhorn-single
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi
        serviceSpec:
          metadata:
            annotations:
              service.cilium.io/global: "true"
          spec:
            type: ClusterIP
          useAsDefault: true
      route:
        enabled: false
    vmalert:
      spec:
        resources:
          requests:
            cpu: 20m
            memory: 128Mi
          limits:
            memory: 256Mi
    alertmanager:
      spec:
        resources:
          requests:
            cpu: 20m
            memory: 128Mi
          limits:
            memory: 256Mi
    prometheus-node-exporter:
      enabled: false
    kube-state-metrics:
      enabled: true
    grafana:
      enabled: false
    kubeScheduler:
      vmScrape:
        spec:
          endpoints:
          - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
            port: http-metrics
            scheme: https
            tlsConfig:
              caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              insecureSkipVerify: true
    kubeControllerManager:
      vmScrape:
        spec:
          endpoints:
          - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
            port: http-metrics
            scheme: https
            tlsConfig:
              caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              serverName: kubernetes
              insecureSkipVerify: true
    # Talos exposes etcd metrics on an unauthenticated metrics-only endpoint
    # (port 2381, http) enabled via cluster.etcd.extraArgs.listen-metrics-urls
    # in the Talos machine config. etcd is not a Kubernetes pod on Talos, so we
    # point kubeEtcd at the control-plane node IP directly (manual endpoints).
    kubeEtcd:
      enabled: true
      endpoints:
      - 192.168.1.70
      service:
        enabled: true
        port: 2381
        targetPort: 2381
      vmScrape:
        spec:
          endpoints:
          - port: http-metrics
            scheme: http
