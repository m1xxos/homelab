---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vm-values
  namespace: monitoring
  labels:
    reconcile.fluxcd.io/watch: Enabled
data:
  values.yaml: |
    nameOverride: "vm"
    fullnameOverride: "vm"
    vmagent:
      route:
        enabled: true
        hostnames:
        - vmagent.local.m1xxos.online
        parentRefs:
        - name: traefik-gateway
          namespace: traefik
    vmsingle:
      spec:
        retentionPeriod: "1d"
        extraArgs:
          opentelemetry.usePrometheusNaming: "true"
        storage:
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 5Gi
        serviceSpec:
          metadata:
            annotations:
              service.cilium.io/global: "true"
          spec:
            type: ClusterIP
          useAsDefault: true
      route:
        enabled: false
    prometheus-node-exporter:
      enabled: true
    kube-state-metrics:
      enabled: true
    grafana:
      enabled: false
    kubeScheduler:
      vmScrape:
        spec:
          endpoints:
          - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
            port: http-metrics
            scheme: https
            tlsConfig:
              caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              insecureSkipVerify: true
    kubeControllerManager:
      vmScrape:
        spec:
          endpoints:
          - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
            port: http-metrics
            scheme: https
            tlsConfig:
              caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              serverName: kubernetes
              insecureSkipVerify: true
    # Talos exposes etcd metrics on an unauthenticated metrics-only endpoint
    # (port 2381, http) enabled via cluster.etcd.extraArgs.listen-metrics-urls
    # in the Talos machine config. etcd is not a Kubernetes pod on Talos, so we
    # point kubeEtcd at the control-plane node IP directly (manual endpoints).
    kubeEtcd:
      enabled: true
      endpoints:
      - 192.168.1.70
      service:
        enabled: true
        port: 2381
        targetPort: 2381
      vmScrape:
        spec:
          endpoints:
          - port: http-metrics
            scheme: http
