---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reflector
  namespace: reflector
spec:
  interval: 30m
  releaseName: reflector
  targetNamespace: reflector
  chart:
    spec:
      chart: reflector
      version: 10.0.54
      sourceRef:
        kind: HelmRepository
        name: reflector
        namespace: flux-system
  values:
    replicaCount: 1
    # 64Mi OOMKilled the .NET runtime at startup (found on first real
    # deploy — #425 merged while flux tracked a stale branch).
    resources:
      requests:
        cpu: 10m
        memory: 96Mi
      limits:
        memory: 256Mi
