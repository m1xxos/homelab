---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reflector
  namespace: reflector
spec:
  interval: 30m
  releaseName: reflector
  targetNamespace: reflector
  chart:
    spec:
      chart: reflector
      version: 10.0.54
      sourceRef:
        kind: HelmRepository
        name: reflector
        namespace: flux-system
  values:
    replicaCount: 1
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi
