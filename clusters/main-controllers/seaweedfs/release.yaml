---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seaweedfs
  namespace: seaweedfs
spec:
  interval: 30m
  chart:
    spec:
      chart: seaweedfs
      version: 4.0.413
      sourceRef:
        kind: HelmRepository
        name: seaweedfs
        namespace: seaweedfs
  values:
    global:
      monitoring:
        enabled: true
    s3:
      annotations:
        service.cilium.io/global: "true"
      # GitLab (the only bucket consumer) was removed in May 2026; the old
      # gitlab-* buckets still exist in the filer and can be purged via s3cmd.
    master:
      resources:
        requests:
          cpu: 10m
          memory: 128Mi
        limits:
          memory: 256Mi
      data:
        type: "persistentVolumeClaim"
        size: "1Gi"
      logs:
        type: "emptyDir"
    filer:
      resources:
        requests:
          cpu: 10m
          memory: 192Mi
        limits:
          memory: 384Mi
      s3:
        enabled: true
        enableAuth: true
        existingConfigSecret: seaweedfs-s3-config
      data:
        type: "persistentVolumeClaim"
        size: "1Gi"
      logs:
        type: "emptyDir"
    volume:
      replicas: 2
      resources:
        requests:
          cpu: 10m
          memory: 150Mi
        limits:
          memory: 320Mi
      dataDirs:
      - name: data
        type: "persistentVolumeClaim"
        size: "3Gi"
        maxVolumes: 0 # If set to zero on non-windows OS, the limit will be auto configured. (default "7")
    admin:
      enabled: true
    cosi:
      enabled: true
