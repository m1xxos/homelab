---
apiVersion: v1
kind: Secret
metadata:
  name: cilium-clustermesh
  namespace: kube-system
stringData:
  # Agent-facing peer config. With kvstoremesh, the local clustermesh-apiserver
  # mirrors the hub's (main's) state, so the entry is named after the REMOTE
  # cluster (main) but points at the LOCAL apiserver etcd. The previous self-named
  # "test" entry made the agent treat it as the local cluster -> 0 remote clusters.
  main: |
    endpoints:
    - https://clustermesh-apiserver.kube-system.svc:2379
    trusted-ca-file: /var/lib/cilium/clustermesh/local-etcd-client-ca.crt
    key-file: /var/lib/cilium/clustermesh/local-etcd-client.key
    cert-file: /var/lib/cilium/clustermesh/local-etcd-client.crt
