---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 20m
  chart:
    spec:
      chart: external-secrets
      version: 2.8.0
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
  install:
    createNamespace: true
  releaseName: external-secrets
  targetNamespace: external-secrets
  values:
    resources:
      requests:
        cpu: 20m
        memory: 160Mi
      limits:
        memory: 320Mi
    webhook:
      resources:
        requests:
          cpu: 10m
          memory: 128Mi
        limits:
          memory: 256Mi
    certController:
      resources:
        requests:
          cpu: 20m
          memory: 128Mi
        limits:
          memory: 256Mi
