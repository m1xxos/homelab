apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  releaseName: longhorn
  chart:
    spec:
      chart: longhorn
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
      version: 1.10.0
  interval: 10m
  targetNamespace: longhorn-system
  values:
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 2
      defaultDataLocality: best-effort
    defaultSettings:
      storageReservedPercentageForDefaultDisk: "10"
      defaultReplicaCount: '{"v1":"2","v2":"2"}'
      defaultDataLocality: best-effort
      engineReplicaTimeout: '{"v1":"30","v2":"30"}'
      concurrentReplicaRebuildPerNodeLimit: "1"
      # Drop system snapshots left after rebuilds: long snapshot chains both
      # waste space and amplify read I/O on the already fragile host disk.
      autoCleanupSystemGeneratedSnapshot: "true"
      # One upload worker thread per backup: slower but gentler NFS writes
      # (recurring jobs additionally run with concurrency 1).
      backupConcurrentLimit: "1"
