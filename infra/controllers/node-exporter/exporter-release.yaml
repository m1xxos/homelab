apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-exporter
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: node-exporter
  targetNamespace: monitoring
  values:
    fullnameOverride: ${CLUSTER_NAME}-node-exporter
    imagePullSecrets:
    - name: dhi-registry
    prometheus:
      monitor:
        enabled: true
        jobLabel: "${CLUSTER_NAME}-cluster-node-exporter"
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
