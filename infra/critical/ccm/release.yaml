---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: talos-ccm
spec:
  interval: 20m
  chart:
    spec:
      chart: charts/talos-cloud-controller-manager
      version: 0.5.2
      sourceRef:
        kind: GitRepository
        name: talos-ccm
  targetNamespace: kube-system
  # See cilium/release.yaml: HR runs in the hub's <name>-cluster ns but installs
  # onto the spoke via kubeConfig — pin Helm storage to kube-system (always exists).
  storageNamespace: kube-system
  values:
    enabledControllers:
    - cloud-node
    - cloud-node-lifecycle
    - node-csr-approval
