---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
spec:
  interval: 20m
  chart:
    spec:
      chart: cilium
      version: 1.19.5
      sourceRef:
        kind: HelmRepository
        name: cilium
  install:
    disableWait: true
  upgrade:
    disableWait: true
  targetNamespace: kube-system
  # Pin release-storage to kube-system: this HR lives in the <name>-cluster ns on
  # the hub but installs onto the spoke via kubeConfig, where <name>-cluster does
  # not exist — without this, Helm storage defaults to the HR ns and install fails.
  storageNamespace: kube-system
  valuesFrom:
  - kind: ConfigMap
    name: cilium-values
    valuesKey: values.yaml
