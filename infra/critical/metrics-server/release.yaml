---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
spec:
  interval: 1h
  chart:
    spec:
      chart: metrics-server
      version: 3.13.0
      sourceRef:
        kind: HelmRepository
        name: metrics-server
  targetNamespace: kube-system
  # See cilium/release.yaml: HR runs in the hub's <name>-cluster ns but installs
  # onto the spoke via kubeConfig — pin Helm storage to kube-system (always exists).
  storageNamespace: kube-system
