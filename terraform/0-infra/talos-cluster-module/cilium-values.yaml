ipam:
  mode: kubernetes

kubeProxyReplacement: true

securityContext:
  capabilities:
    ciliumAgent:
    - CHOWN
    - KILL
    - NET_ADMIN
    - NET_RAW
    - IPC_LOCK
    - SYS_ADMIN
    - SYS_RESOURCE
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
    cleanCiliumState:
    - NET_ADMIN
    - SYS_ADMIN
    - SYS_RESOURCE

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

k8sServiceHost: localhost
k8sServicePort: 7445

hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true

l2announcements:
  enabled: true

# All nodes share one L2 segment (192.168.1.0/24 on vmbr0): route pod CIDRs
# directly between nodes instead of paying VXLAN encapsulation (CPU per
# packet + 50 bytes of MTU).
routingMode: native
autoDirectNodeRoutes: true
ipv4NativeRoutingCIDR: "10.244.0.0/16"

cluster:
  name: ${cluster_name}
  id: ${cluster_id}

# ClusterMesh is disabled while main is the only cluster: the apiserver,
# kvstoremesh and etcd sidecar pods would idle with no peers. Re-enable this
# block (and the matching ExternalSecrets in clusters/<name>-configs/cilium/)
# when a second cluster appears.
# clustermesh:
#   useAPIServer: true
#   apiserver:
#     kvstoremesh:
#       enabled: true
#     service:
#       type: LoadBalancer
#     tls:
#       auto:
#         enabled: true
#         method: helm
#       server:
#         extraIpAddresses:
#         - ${clustermesh_endpoint}
